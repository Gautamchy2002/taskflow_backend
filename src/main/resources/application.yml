spring:
  application:
    name: taskflow

  data:
    mongodb:
      uri: ${MONGO_URI}
      database: taskflowdb
      auto-index-creation: true
    redis:
      url: ${REDIS_URL}


  mail:
    host: smtp.gmail.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        ssl:
          enable: true

server:
  port: ${PORT:8080}